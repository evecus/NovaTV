name: debug test

on:
  workflow_dispatch:        # 允许手动触发

jobs:
  build-arm32-debug:
    name: Build armeabi-v7a Debug
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build armeabi-v7a Debug APK (java32 flavor)
        run: ./gradlew assembleJava32Debug --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.workers.max=2"

      - name: List output APKs
        run: find app/build/outputs/apk -name "*.apk" | sort

      - name: Upload armeabi-v7a Release APK
        uses: actions/upload-artifact@v4
        with:
          name: NovaTV-armeabi-v7a-debug-${{ github.run_number }}
          path: app/build/outputs/apk/java32/debug/*.apk
          retention-days: 1

  # ── 发布 Pre-release ─────────────────────────────────────────────
  release:
    name: Create Pre-release
    needs: [build-arm32-debug]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Debug APK artifact
        uses: actions/download-artifact@v4
        with:
          pattern: NovaTV-*
          merge-multiple: true
          path: release-apks/

      - name: Create GitHub Pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: debug-${{ github.run_number }}
          name: NovaTV-debug-${{ github.run_number }}
          prerelease: true
          files: release-apks/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
